<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#d0d0d0"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#f7f7f7"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <rect width="800" height="450" fill="url(#dots)"/>

  <!-- Subtle axis lines -->
  <line x1="80" y1="380" x2="720" y2="380" stroke="#ccc" stroke-width="1.5"/>
  <line x1="80" y1="380" x2="80" y2="60" stroke="#ccc" stroke-width="1.5"/>

  <!-- Subtle bar chart in background -->
  <rect x="130" y="280" width="50" height="100" fill="#e8e8e8" rx="3"/>
  <rect x="230" y="240" width="50" height="140" fill="#e8e8e8" rx="3"/>
  <rect x="330" y="300" width="50" height="80" fill="#e8e8e8" rx="3"/>
  <rect x="430" y="200" width="50" height="180" fill="#e8e8e8" rx="3"/>
  <rect x="530" y="260" width="50" height="120" fill="#e8e8e8" rx="3"/>
  <rect x="630" y="310" width="50" height="70" fill="#e8e8e8" rx="3"/>

  <!-- Tick marks -->
  <line x1="155" y1="380" x2="155" y2="386" stroke="#ccc" stroke-width="1"/>
  <line x1="255" y1="380" x2="255" y2="386" stroke="#ccc" stroke-width="1"/>
  <line x1="355" y1="380" x2="355" y2="386" stroke="#ccc" stroke-width="1"/>
  <line x1="455" y1="380" x2="455" y2="386" stroke="#ccc" stroke-width="1"/>
  <line x1="555" y1="380" x2="555" y2="386" stroke="#ccc" stroke-width="1"/>
  <line x1="655" y1="380" x2="655" y2="386" stroke="#ccc" stroke-width="1"/>

  <!-- Stroop words — mismatched ink colours -->
  <!-- RED written in green -->
  <text x="160" y="160" font-family="Helvetica, Arial, sans-serif" font-size="80" font-weight="700" fill="#28a745" text-anchor="middle">RED</text>

  <!-- GREEN written in blue -->
  <text x="420" y="160" font-family="Helvetica, Arial, sans-serif" font-size="80" font-weight="700" fill="#3d5afe" text-anchor="middle">GREEN</text>

  <!-- BLUE written in burgundy/red -->
  <text x="660" y="160" font-family="Helvetica, Arial, sans-serif" font-size="80" font-weight="700" fill="#9B1B30" text-anchor="middle">BLUE</text>

  <!-- Subtitle -->
  <text x="400" y="430" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#888" text-anchor="middle" letter-spacing="3">THE STROOP EFFECT</text>
</svg>