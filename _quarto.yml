project:
  type: website
  output-dir: docs

website:
  title: "PS51009D Science Communication Blog"
  description: "Student science communication from PS51009D Applications of Psychological Research, Goldsmiths, University of London"
  favicon: assets/GoldLogo.png

  navbar:
    logo: assets/images/svg/goldpsychr-logo-animated.svg
    logo-alt: "GoldPsychR — Goldsmiths Psychology"
    title: false
    background: "#9B1B30"
    foreground: "#FFFFFF"
    left:
      - text: "Posts"
        href: index.qmd
      - text: "Assessment"
        href: assessment.qmd
      - text: "How to Publish"
        href: contributing.qmd
      - text: "Formatting Guide"
        href: posts/formatting-guide/index.qmd
      - text: "Activities"
        menu:
          - text: "Seminar: Reading Like a Writer"
            href: seminar-activity.qmd
          - text: "Worksheet: Analysing Quality"
            href: Worksheet.qmd
          - text: "Facilitator Guide"
            href: FacilitatorGuide.qmd
      - text: "Slides"
        menu:
          - text: "Assessment Brief"
            href: slides.qmd
          - text: "Why Science Communication"
            href: slides-why-scicomm.qmd
      - text: "Showcase"
        menu:
          - text: "Format Overview"
            href: showcase/poster.qmd
          - text: "Student Dashboard"
            href: showcase/dashboard.qmd
          - text: "APA 7 Paper"
            href: showcase/apa-paper.qmd
          - text: "Interactive Worksheet"
            href: showcase/worksheet.qmd
          - text: "Scrollytelling Demo"
            href: posts/minards-map/index.qmd
      - text: "About"
        href: about.qmd

  page-footer:
    left: "PS51009D Applications of Psychological Research — Goldsmiths, University of London"
    right: "Built with [Quarto](https://quarto.org)"

citation-style: apa.csl

format:
  html:
    theme: [cosmo, custom.scss]
    css:
      - include/webex.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-tools: true
    code-copy: true
    smooth-scroll: true
    highlight-style: github
    link-external-newwindow: true
    anchor-sections: true
    include-in-header:
      - include/fonts.html
    include-after-body:
      - include/webex.js
    comments:
      hypothesis: true

# Global execution options
execute:
  freeze: auto
  cache: true
  warning: false
  message: false
